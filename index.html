<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tools</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0c0a;
      --surface: #131210;
      --border: #2a2620;
      --border-glow: #5a4a2a;
      --gold: #c9a84c;
      --gold-dim: #7a6030;
      --gold-bright: #e8c96a;
      --text: #d4c9b0;
      --text-dim: #7a7060;
      --red: #8b2020;
      --red-glow: #c03030;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Text', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
      position: relative;
    }

    /* Atmospheric background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(90, 60, 10, 0.18) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 80% 100%, rgba(60, 20, 20, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse 80% 80% at 50% 50%, rgba(20, 18, 12, 0.5) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* Noise grain overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
      text-align: center;
    }

    /* Decorative top rule */
    .rule {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards;
    }
    .rule-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    }
    .rule-diamond {
      width: 6px;
      height: 6px;
      background: var(--gold);
      transform: rotate(45deg);
      box-shadow: 0 0 8px var(--gold);
    }

    header {
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.1s forwards;
    }

    .eyebrow {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 1rem;
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 400;
      color: var(--gold);
      text-shadow: 0 0 40px rgba(201, 168, 76, 0.3), 0 2px 4px rgba(0,0,0,0.8);
      line-height: 1.1;
      letter-spacing: 0.05em;
    }

    .subtitle {
      margin-top: 0.75rem;
      font-size: 1rem;
      color: var(--text-dim);
      font-style: italic;
      letter-spacing: 0.02em;
    }

    /* Tool cards */
    .tools {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .tool-link {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      padding: 1.25rem 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      text-decoration: none;
      color: var(--text);
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s, box-shadow 0.3s;
      opacity: 0;
    }

    .tool-link:nth-child(1) { animation: fadeUp 0.7s ease 0.25s forwards; }
    .tool-link:nth-child(2) { animation: fadeUp 0.7s ease 0.38s forwards; }

    .tool-link::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(201, 168, 76, 0.04) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .tool-link::after {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--gold);
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform 0.3s ease;
      box-shadow: 0 0 12px var(--gold);
    }

    .tool-link:hover {
      border-color: var(--border-glow);
      box-shadow: 0 0 30px rgba(201, 168, 76, 0.08), inset 0 0 20px rgba(201, 168, 76, 0.03);
    }

    .tool-link:hover::before { opacity: 1; }
    .tool-link:hover::after { transform: scaleY(1); }

    .tool-icon {
      font-size: 1.6rem;
      width: 2.5rem;
      text-align: center;
      flex-shrink: 0;
      filter: drop-shadow(0 0 6px rgba(201,168,76,0.4));
      transition: filter 0.3s, transform 0.3s;
    }

    .tool-link:hover .tool-icon {
      filter: drop-shadow(0 0 10px rgba(201,168,76,0.7));
      transform: scale(1.1);
    }

    .tool-info {
      text-align: left;
      flex: 1;
    }

    .tool-name {
      font-family: 'Cinzel', serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.05em;
      display: block;
      margin-bottom: 0.2rem;
      transition: color 0.3s;
    }

    .tool-link:hover .tool-name { color: var(--gold-bright); }

    .tool-desc {
      font-size: 0.85rem;
      color: var(--text-dim);
      font-style: italic;
    }

    .tool-arrow {
      color: var(--gold-dim);
      font-size: 1rem;
      transition: color 0.3s, transform 0.3s;
      flex-shrink: 0;
    }

    .tool-link:hover .tool-arrow {
      color: var(--gold);
      transform: translateX(4px);
    }

    /* Bottom rule */
    .rule-bottom {
      margin-top: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.5s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="rule">
      <div class="rule-line"></div>
      <div class="rule-diamond"></div>
      <div class="rule-line"></div>
    </div>

    <header>
      <p class="eyebrow">Collection</p>
      <h1>The Toolkit</h1>
      <p class="subtitle">Choose your instrument</p>
    </header>

    <nav class="tools">
      <a href="blades-dice-roller.html" class="tool-link">
        <span class="tool-icon">⚄</span>
        <div class="tool-info">
          <span class="tool-name">Blades Dice Roller</span>
          <span class="tool-desc">Roll dice for Blades in the Dark</span>
        </div>
        <span class="tool-arrow">→</span>
      </a>

      <a href="habit-tracker.html" class="tool-link">
        <span class="tool-icon">◈</span>
        <div class="tool-info">
          <span class="tool-name">Habit Tracker</span>
          <span class="tool-desc">Track and build daily habits</span>
        </div>
        <span class="tool-arrow">→</span>
      </a>
    </nav>

    <div class="rule rule-bottom">
      <div class="rule-line"></div>
      <div class="rule-diamond"></div>
      <div class="rule-line"></div>
    </div>
  </div>
</body>
</html>
